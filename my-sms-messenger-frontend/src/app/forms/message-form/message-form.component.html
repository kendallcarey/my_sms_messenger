<mat-card appearance="outlined" class="message-form container">
  <mat-card-header>
    <h2>New Message</h2>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="createMessageForm" (submit)="submitMessage()">
      <label for="phone-number-input">Phone Number</label>
      <br>
      <mat-form-field appearance="outline" class="message-full-width">
        <input matInput formControlName="phoneNumber" id="phone-number-input">
      </mat-form-field>
      <br>
      <label for="text-input">Message</label>
      <br>
      <mat-form-field appearance="outline" class="message-full-width">
        <textarea
          id="text-input"
          #textInput
          matInput
          formControlName="text"
          cdkTextareaAutosize
          cdkAutosizeMinRows="5"
          cdkAutosizeMaxRows="10"
          maxlength="250">
        </textarea>
      </mat-form-field>
      <br>
      <small class="text-counter">{{ textInput ? textInput.value.length : 0 }}/250</small>
      <br>
      <button mat-button (click)="clearForm()" id="clear-button">Clear</button>
      <button mat-flat-button id="submit-button">Submit</button>
    </form>
  </mat-card-content>
</mat-card>
